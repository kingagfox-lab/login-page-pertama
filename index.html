<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page Agung</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
    <div class="background">
        <div class="stars"></div>
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
        <div class="mountainsLayer"></div>
        <div class="treesLayer"></div>
    </div>

    <div class="wrapper">
        <div class="form-box login">
            <form id="loginForm">
                <h2>Login</h2>
                <div class="input-box">
                    <input type="email" name="email" placeholder="Email" required>
                    <ion-icon name="mail"></ion-icon>
                </div>
                <div class="input-box">
                    <input type="password" name="password" placeholder="Password" required>
                    <ion-icon name="eye-off" class="toggle-password" style="cursor: pointer;"></ion-icon>
                </div>
                <div class="remember-forgot">
                    <label><input type="checkbox" id="rememberMe"> Remember me</label>
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="btn">Login</button>
                <div class="register-link">
                    <p>Don't have an account? <a href="#" class="register-link-btn">Register</a></p>
                </div>
            </form>
        </div>

        <div class="form-box register">
            <form id="registerForm">
                <h2>Registration</h2>
                <div class="input-box">
                    <input type="text" name="username" placeholder="Username" required>
                    <ion-icon name="person"></ion-icon>
                </div>
                <div class="input-box">
                    <input type="email" name="email" placeholder="Email" required>
                    <ion-icon name="mail"></ion-icon>
                </div>
                <div class="input-box">
                    <input type="password" name="password" placeholder="Password" required>
                    <ion-icon name="eye-off" class="toggle-password" style="cursor: pointer;"></ion-icon>
                </div>
                <div class="remember-forgot">
                    <label><input type="checkbox" required> I agree to the terms</label>
                </div>
                <button type="submit" class="btn">Register</button>
                <div class="register-link">
                    <p>Already have an account? <a href="#" class="login-link-btn">Login</a></p>
                </div>
            </form>
        </div>
    </div>
    <script>
        const wrapper = document.querySelector('.wrapper');
        const loginLink = document.querySelector('.login-link-btn');
        const registerLink = document.querySelector('.register-link-btn');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');

        let database = JSON.parse(localStorage.getItem('userDatabase')) || [
            { email: 'kingagfox@gmail.com', password: 'kingagfoxx1234' }
        ];
        localStorage.setItem('userDatabase', JSON.stringify(database));

        function showMessage(text, isError = false) {
            let existingMsg = document.querySelector('.toast-msg');
            if (existingMsg) existingMsg.remove();

            const msg = document.createElement('div');
            msg.className = `toast-msg ${isError ? 'error' : 'success'}`;
            msg.textContent = text;
            document.body.appendChild(msg);

            setTimeout(() => msg.classList.add('show'), 10);
            
            setTimeout(() => {
                if (msg.parentElement) {
                    msg.classList.remove('show');
                    setTimeout(() => msg.remove(), 400);
                }
            }, 3000);
        }

        registerLink.addEventListener('click', (e) => {
            e.preventDefault();
            wrapper.classList.add('active');
        });

        loginLink.addEventListener('click', (e) => {
            e.preventDefault();
            wrapper.classList.remove('active');
        });
      loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = loginForm.querySelector('input[name="email"]').value;
      const password = loginForm.querySelector('input[name="password"]').value;
      const userExists = database.some(user => user.email === email && user.password === password);
      if (userExists) {
          showMessage('login succesfully');
          setTimeout(() => {
-             window.open('https://kingagfox-lab.github.io/porto-2.0/', '_blank');
+             if (email === 'kingagfox@gmail.com' && password === 'kingagfoxx1234') {
+                 window.open('https://kingagfox-lab.github.io/LOGIN-DASHBOARD/', '_blank');
+             } else {
+                 window.open('https://kingagfox-lab.github.io/porto-2.0/', '_blank');
+             }
          }, 1000);
      } else {
          showMessage('Invalid email or password.', true);
            }
        });

        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const username = registerForm.querySelector('input[name="username"]').value;
            const email = registerForm.querySelector('input[name="email"]').value;
            const password = registerForm.querySelector('input[name="password"]').value;

            const emailExists = database.some(user => user.email === email);
            if (emailExists) {
                showMessage('Email is already registered!', true);
                return;
            }

            database.push({ username, email, password });
            localStorage.setItem('userDatabase', JSON.stringify(database));

            showMessage('Registered succesfully!');

            wrapper.classList.remove('active');
            registerForm.reset();
        });

        const togglePasswords = document.querySelectorAll('.toggle-password');
        togglePasswords.forEach(icon => {
            icon.addEventListener('click', () => {
                const input = icon.previousElementSibling;
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.setAttribute('name', 'eye');
                } else {
                    input.type = 'password';
                    icon.setAttribute('name', 'eye-off');
                }
            });
        });
    </script>
</body>

</html>
